# Local-dev nginx config. Replaces conf.d/abaco-news.conf when running
# via docker-compose.override.yml. No SSL, no hardcoded domain.
server {
    listen 80;
    server_name _;

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Health check (public)
    location /health {
        proxy_pass http://backend:8000/health;
        access_log off;
    }

    # Frontend (React SPA) — fallback to index.html for SPA routes
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_intercept_errors on;
        error_page 404 = @frontend_fallback;
    }

    location @frontend_fallback {
        proxy_pass http://frontend:80/index.html;
    }
}
