# Local-dev override. Loaded automatically by `docker compose up`.
#
# What it does:
#   - Disables the production nginx + certbot (move them to a `production`
#     profile so they only start with `docker compose --profile production up`).
#   - Adds a tiny nginx-local proxy on :8080 that serves the frontend and
#     proxies /api/* to the backend. No SSL, no domain hardcoding.
#   - Publishes backend :8000 directly for hitting Swagger UI / FastAPI docs.
#
# After `docker compose up -d`:
#   - http://localhost:8080         — full app (frontend + API via local nginx)
#   - http://localhost:8000/docs    — FastAPI Swagger UI
#   - http://localhost:8080/health  — backend health check
#
# To run with the production nginx (real domain, real certs), use:
#   docker compose --profile production up

services:
  nginx:
    profiles: ["production"]

  certbot:
    profiles: ["production"]

  backend:
    ports:
      - "8000:8000"

  nginx-local:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
